name: Update prayer calendar

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch: {}
  push:
    branches: [ main ]

permissions:
  contents: write

concurrency:
  group: update-prayer-calendar
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Generate prayers.ics
        run: npm run generate
        env:
          MOSQUE_SLUG: islamitisch-centrum-barendrecht-barendrecht-2992-lb-netherlands
          MOSQUE_NAME: IC Barendrecht
          TIMEZONE: Europe/Amsterdam
          INCLUDE_SHURUQ: "true"
          EVENT_DURATION_MINUTES: "20"

      - name: Commit and push if the calendar changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/prayers.ics
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update prayer times ($(date -u +'%Y-%m-%d'))"
            git push
          fi
